<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Calculator — BayQadam</title>
    <link rel="stylesheet" href="css/mycss.css" />
    <link rel="stylesheet" href="css/pricing.css" />
    <link rel="stylesheet" href="css/advanced.css" />
    <style>
      .calculator-page {
        padding: 110px 24px 80px;
        background:
          radial-gradient(
            ellipse at 75% 25%,
            rgba(25, 195, 125, 0.14) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 15% 90%,
            rgba(31, 138, 95, 0.18) 0%,
            transparent 50%
          ),
          var(--bg);
        min-height: 100vh;
      }

      .calc-wrap {
        max-width: 720px;
        margin: 0 auto;
        text-align: left;
      }

      .calc-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 16px;
      }
      .calc-wrap h1 {
        font-family: "Fraunces", serif;
        text-align: left;
        background: none;
        -webkit-text-fill-color: var(--cream);
        color: var(--cream);
        font-size: clamp(40px, 6vw, 64px);
        font-weight: 400;
        margin: 0 0 16px;
        letter-spacing: -0.035em;
        line-height: 1;
      }
      .calc-wrap h1 em {
        font-style: italic;
        color: var(--mint);
        font-weight: 400;
      }
      .calc-wrap > .subtitle {
        text-align: left;
        font-size: 17px;
        color: var(--cream-dim);
        margin: 0 0 40px;
        max-width: 560px;
        line-height: 1.55;
      }

      .calc-form {
        max-width: 720px;
        margin: 0;
        background: var(--bg-2);
        border: 1px solid var(--line);
        padding: 40px;
        border-radius: var(--radius-lg);
        box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .calc-form label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-weight: 500;
      }
      .calc-form input {
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--bg-3);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 16px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .calc-form input::placeholder {
        color: var(--muted);
      }
      .calc-form input:focus {
        outline: 0;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(25, 195, 125, 0.18);
      }
      .calc-form button.btn.primary {
        margin-top: 8px;
        padding: 15px;
        font-size: 14px;
        justify-content: center;
      }

      #result.result-box {
        margin: 28px 0 0;
        max-width: 720px;
        background: var(--bg-3);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 30px 28px;
        box-shadow: none;
        color: var(--cream);
        position: relative;
      }
      #result.result-box::before {
        content: "OUTPUT";
        top: 16px;
        right: 20px;
      }
      #result h3 {
        font-family: "Fraunces", serif;
        font-weight: 500;
        font-size: 22px;
        color: var(--cream);
        margin: 0 0 16px;
        letter-spacing: -0.02em;
      }
      #result p {
        color: var(--cream-dim);
        font-size: 15px;
        line-height: 1.65;
        margin: 0 0 12px;
      }
      #result p#summary {
        color: var(--accent);
        font-family: "Fraunces", serif;
        font-size: 22px;
        font-weight: 400;
        letter-spacing: -0.015em;
        line-height: 1.4;
      }
      #result button {
        margin-top: 16px;
      }

      @media (max-width: 640px) {
        .calc-form {
          padding: 28px 22px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo">BayQadam</a>

        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="kk">KZ</button>
        </div>

        <button class="burger" id="burger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>

        <nav class="nav" id="nav">
          <ul>
            <li><a href="index.html" data-i18n="home">Home</a></li>
            <li>
              <a href="calculator.html" data-i18n="calculator">Calculator</a>
            </li>
            <li>
              <a href="credit.html" data-i18n="creditCalc">Credit Calculator</a>
            </li>
            <li>
              <a href="video.html" data-i18n="videoLessons">Video Lessons</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="calculator-page">
      <div class="calc-wrap">
        <div class="calc-eyebrow">BAYQADAM / CALC — 01</div>
        <h1 data-i18n="calcTitle">Financial <em>Calculator</em></h1>
        <p class="subtitle" data-i18n="calcSubtitle">
          Find out how much you can save and how to improve your finances.
        </p>

        <form id="calcForm" class="calc-form">
          <label>
            <span data-i18n="monthlyIncome">Monthly Income (₸)</span>
            <input type="number" id="income" placeholder="300 000" required />
          </label>
          <label>
            <span data-i18n="monthlyExpenses">Monthly Expenses (₸)</span>
            <input type="number" id="expenses" placeholder="200 000" required />
          </label>
          <label>
            <span data-i18n="currentDebt">Current Debt (₸)</span>
            <input type="number" id="debt" placeholder="150 000" required />
          </label>
          <button type="submit" class="btn primary" data-i18n="calculate">
            Calculate
          </button>
        </form>

        <div id="result" class="result-box" style="display: none">
          <h3 data-i18n="result">Result</h3>
          <p id="summary"></p>
          <p id="advice"></p>
          <button id="resetCalc" class="btn outline" data-i18n="newCalculation">
            New Calculation
          </button>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          &copy; 2025 BayQadam.
          <span data-i18n="allRights">All rights reserved.</span>
        </p>
      </div>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>
    <script src="js/script.js"></script>
    <script>
      document.getElementById("calcForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const income = parseFloat(document.getElementById("income").value);
        const expenses = parseFloat(document.getElementById("expenses").value);
        const debt = parseFloat(document.getElementById("debt").value);
        const savings = income - expenses;
        const savingsPercent = ((savings / income) * 100).toFixed(1);
        document.getElementById("result").style.display = "block";

        const lang = localStorage.getItem("language") || "en";
        const summaryTexts = {
          en: `You can save ${savings.toLocaleString()} ₸ per month (${savingsPercent}% of income).`,
          ru: `Вы можете откладывать ${savings.toLocaleString()} ₸ в месяц (${savingsPercent}% от дохода).`,
          kk: `Сіз айына ${savings.toLocaleString()} ₸ жинай аласыз (табыстың ${savingsPercent}%).`,
        };
        document.getElementById("summary").textContent = summaryTexts[lang];

        let advice = "";
        if (savings < 0) {
          advice = {
            en: "⚠ Your expenses exceed your income. Review your spending and find ways to reduce costs.",
            ru: "⚠ Расходы превышают доход. Пересмотрите траты и найдите способы сократить расходы.",
            kk: "⚠ Шығындарыңыз табысыңыздан асып түсті. Шығындарыңызды қарап шығыңыз.",
          }[lang];
        } else if (savings < income * 0.1) {
          advice = {
            en: "→ Try to save at least 10–20% of your income. Start small.",
            ru: "→ Старайтесь откладывать минимум 10–20% дохода. Начните с малого.",
            kk: "→ Табысыңыздың кемінде 10–20%-ын жинауға тырысыңыз.",
          }[lang];
        } else if (debt > income * 3) {
          advice = {
            en: "→ Your debt is high. Consider consolidation and prioritize paying it off.",
            ru: "→ Долг велик. Рассмотрите консолидацию и приоритизируйте погашение.",
            kk: "→ Қарызыңыз жоғары. Қарызды біріктіруді қарастырыңыз.",
          }[lang];
        } else {
          advice = {
            en: "✓ Great job. Keep tracking expenses and growing your savings.",
            ru: "✓ Отлично. Продолжайте отслеживать расходы и увеличивать сбережения.",
            kk: "✓ Жақсы жұмыс. Шығындарды қадағалауды жалғастырыңыз.",
          }[lang];
        }
        document.getElementById("advice").textContent = advice;
      });

      document.getElementById("resetCalc").addEventListener("click", () => {
        document.getElementById("calcForm").reset();
        document.getElementById("result").style.display = "none";
      });
    </script>
  </body>
</html>
