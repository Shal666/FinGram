<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Calculator — BayQadam</title>
    <link rel="stylesheet" href="css/mycss.css" />
    <link rel="stylesheet" href="css/pricing.css" />
    <link rel="stylesheet" href="css/advanced.css" />
    <style>
      .credit-page {
        padding: 110px 24px 80px;
        background:
          radial-gradient(
            ellipse at 80% 20%,
            rgba(25, 195, 125, 0.14) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 10% 90%,
            rgba(31, 138, 95, 0.18) 0%,
            transparent 50%
          ),
          var(--bg);
        min-height: 100vh;
      }

      .credit-container {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 44px;
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.6);
        position: relative;
      }
      .credit-container::before {
        content: "BAYQADAM / CREDIT — 02";
        display: block;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 20px;
      }

      .credit-container h2 {
        margin: 0 0 36px;
        font-family: "Fraunces", serif;
        background: none;
        -webkit-text-fill-color: var(--cream);
        color: var(--cream);
        font-size: clamp(34px, 4.5vw, 48px);
        font-weight: 400;
        text-align: left;
        letter-spacing: -0.03em;
        line-height: 1.05;
      }
      .credit-container h2 em {
        font-style: italic;
        color: var(--mint);
        font-weight: 400;
      }

      .credit-container .form-group {
        margin-bottom: 30px;
      }

      .credit-container .form-group label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      .credit-container .form-group label > span:last-child {
        font-family: "Fraunces", serif;
        font-size: 22px;
        font-weight: 400;
        color: var(--accent);
        letter-spacing: -0.015em;
        text-transform: none;
      }

      /* Slider */
      .credit-container input[type="range"] {
        width: 100%;
        height: 4px;
        border-radius: 0;
        background: var(--bg-4);
        outline: none;
        -webkit-appearance: none;
        appearance: none;
        cursor: pointer;
      }
      .credit-container input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow:
          0 0 0 4px rgba(25, 195, 125, 0.18),
          0 0 12px rgba(25, 195, 125, 0.5);
        cursor: pointer;
        border: 0;
        transition:
          transform 0.15s,
          box-shadow 0.2s;
      }
      .credit-container input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
        box-shadow:
          0 0 0 6px rgba(25, 195, 125, 0.22),
          0 0 20px rgba(25, 195, 125, 0.7);
      }
      .credit-container input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow:
          0 0 0 4px rgba(25, 195, 125, 0.18),
          0 0 12px rgba(25, 195, 125, 0.5);
        cursor: pointer;
        border: 0;
      }

      .credit-container > button {
        width: 100%;
        padding: 15px;
        margin-top: 8px;
        background: var(--accent);
        color: var(--bg);
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        font-family: "Inter", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
        text-transform: none;
        letter-spacing: 0;
        box-shadow: none;
      }
      .credit-container > button:hover {
        background: var(--mint);
        border-color: var(--mint);
        color: var(--bg);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px -8px rgba(25, 195, 125, 0.6);
      }

      .result {
        margin-top: 36px;
        padding: 28px 26px;
        background: var(--bg-3);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        color: var(--cream);
        font-family: "Inter", sans-serif;
        font-size: 15px;
        line-height: 2.1;
        position: relative;
      }
      .result::before {
        content: "OUTPUT";
        position: absolute;
        top: 14px;
        right: 18px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--accent);
        letter-spacing: 0.14em;
        font-weight: 600;
      }
      .result b {
        font-family: "Fraunces", serif;
        font-size: 24px;
        font-weight: 400;
        color: var(--accent);
        letter-spacing: -0.015em;
        margin-left: 6px;
      }

      @media (max-width: 640px) {
        .credit-container {
          padding: 32px 22px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo">BayQadam</a>

        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="kk">KZ</button>
        </div>

        <button class="burger" id="burger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>

        <nav class="nav" id="nav">
          <ul>
            <li><a href="index.html" data-i18n="home">Home</a></li>
            <li>
              <a href="calculator.html" data-i18n="calculator">Calculator</a>
            </li>
            <li>
              <a href="credit.html" data-i18n="creditCalc">Credit Calculator</a>
            </li>
            <li>
              <a href="video.html" data-i18n="videoLessons">Video Lessons</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="credit-page">
      <div class="credit-container">
        <h2 data-i18n="creditTitle">Credit <em>Calculator</em></h2>

        <div class="form-group">
          <label>
            <span data-i18n="loanAmount">Loan Amount</span>
            <span id="amountValue">1,000,000 ₸</span>
          </label>
          <input
            type="range"
            id="amount"
            min="50000"
            max="10000000"
            step="50000"
            value="1000000"
          />
        </div>

        <div class="form-group">
          <label>
            <span data-i18n="loanTerm">Loan Term</span>
            <span id="monthsValue"
              >12 <span data-i18n="months">months</span></span
            >
          </label>
          <input
            type="range"
            id="months"
            min="3"
            max="60"
            step="1"
            value="12"
          />
        </div>

        <div class="form-group">
          <label>
            <span data-i18n="interestRate">Interest Rate</span>
            <span id="rateValue">15 %</span>
          </label>
          <input
            type="range"
            id="rate"
            min="5"
            max="40"
            step="0.1"
            value="15"
          />
        </div>

        <button onclick="calculate()" data-i18n="calculate">Calculate</button>

        <div class="result" id="result">
          → <span data-i18n="monthlyPayment">Monthly Payment</span>:
          <b>90,258 ₸</b><br />
          → <span data-i18n="totalPayment">Total Payment</span>:
          <b>1,083,100 ₸</b><br />
          → <span data-i18n="overpayment">Overpayment</span>: <b>83,100 ₸</b>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          &copy; 2025 BayQadam.
          <span data-i18n="allRights">All rights reserved.</span>
        </p>
      </div>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>
    <script src="js/script.js"></script>
    <script>
      const amountSlider = document.getElementById("amount");
      const monthsSlider = document.getElementById("months");
      const rateSlider = document.getElementById("rate");
      const amountValue = document.getElementById("amountValue");
      const monthsValue = document.getElementById("monthsValue");
      const rateValue = document.getElementById("rateValue");
      const resultDiv = document.getElementById("result");

      function updateLabels() {
        const lang = localStorage.getItem("language") || "en";
        const monthsText = translations[lang].months;
        monthsValue.innerHTML = `${monthsSlider.value} <span data-i18n="months">${monthsText}</span>`;
      }

      amountSlider.addEventListener("input", () => {
        amountValue.textContent =
          parseInt(amountSlider.value).toLocaleString() + " ₸";
        calculate();
      });
      monthsSlider.addEventListener("input", () => {
        updateLabels();
        calculate();
      });
      rateSlider.addEventListener("input", () => {
        rateValue.textContent = rateSlider.value + " %";
        calculate();
      });

      function calculate() {
        const amount = parseFloat(amountSlider.value);
        const months = parseInt(monthsSlider.value);
        const rate = parseFloat(rateSlider.value) / 100 / 12;
        const monthlyPayment =
          (amount * (rate * Math.pow(1 + rate, months))) /
          (Math.pow(1 + rate, months) - 1);
        const totalPayment = monthlyPayment * months;
        const overpayment = totalPayment - amount;
        const lang = localStorage.getItem("language") || "en";
        const t = translations[lang];

        resultDiv.innerHTML = `
          → ${t.monthlyPayment}: <b>${Math.round(monthlyPayment).toLocaleString()} ₸</b><br>
          → ${t.totalPayment}: <b>${Math.round(totalPayment).toLocaleString()} ₸</b><br>
          → ${t.overpayment}: <b>${Math.round(overpayment).toLocaleString()} ₸</b>
        `;
      }

      document.addEventListener("DOMContentLoaded", () => {
        updateLabels();
        calculate();
      });
      document.querySelectorAll("[data-lang]").forEach((btn) => {
        btn.addEventListener("click", () => {
          setTimeout(() => {
            updateLabels();
            calculate();
          }, 100);
        });
      });
    </script>
  </body>
</html>
