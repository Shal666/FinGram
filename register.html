1️⃣ Файл: /app/register.html Создай этот файл в корне /app/ и скопируй код:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — BayQadam</title>
    <link rel="stylesheet" href="css/mycss.css" />
    <link rel="stylesheet" href="css/forms.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h1 data-i18n="registerTitle">Регистрация</h1>
        <p data-i18n="registerSubtitle">
          Создайте аккаунт для управления финансами
        </p>

        <div
          id="errorMessage"
          class="error-message"
          style="display: none"
        ></div>

        <form id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="firstName">Имя</label>
              <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
              <label data-i18n="lastName">Фамилия</label>
              <input type="text" id="surname" name="surname" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label data-i18n="age">Возраст</label>
              <input
                type="number"
                id="age"
                name="age"
                min="13"
                max="120"
                required
              />
            </div>
            <div class="form-group">
              <label data-i18n="currency">Валюта</label>
              <select id="currency" name="currency" required>
                <option value="KZT">₸ Тенге (KZT)</option>
                <option value="RUB">₽ Рубль (RUB)</option>
                <option value="USD">$ Доллар (USD)</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label data-i18n="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label data-i18n="password">Пароль</label>
            <input
              type="password"
              id="password"
              name="password"
              minlength="6"
              required
            />
          </div>

          <button type="submit" class="btn-auth" id="submitBtn">
            <span data-i18n="register">Зарегистрироваться</span>
          </button>
        </form>

        <div class="auth-footer">
          <span data-i18n="alreadyHaveAccount">Уже есть аккаунт?</span>
          <a href="login.html" data-i18n="login">Войти</a>
        </div>

        <div class="auth-footer" style="margin-top: 15px">
          <a href="index.html" data-i18n="backToHome">← Вернуться на главную</a>
        </div>
      </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>
    <script src="js/api.js"></script>
    <script>
      const form = document.getElementById("registerForm");
      const errorDiv = document.getElementById("errorMessage");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Hide previous errors
        errorDiv.style.display = "none";
        submitBtn.disabled = true;
        submitBtn.textContent = "⏳ Регистрация...";

        const formData = {
          name: document.getElementById("name").value.trim(),
          surname: document.getElementById("surname").value.trim(),
          age: parseInt(document.getElementById("age").value),
          currency: document.getElementById("currency").value,
          email: document.getElementById("email").value.trim().toLowerCase(),
          password: document.getElementById("password").value,
        };

        try {
          const response = await apiFetch("/api/auth/register", {
            method: "POST",
            body: JSON.stringify(formData),
          });

          // Success - redirect to dashboard
          window.location.href = "/dashboard.html";
        } catch (error) {
          errorDiv.textContent = error.message;
          errorDiv.style.display = "block";
          submitBtn.disabled = false;

          const lang = localStorage.getItem("language") || "en";
          const btnText = {
            en: "Register",
            ru: "Зарегистрироваться",
            kk: "Тіркелу",
          };
          submitBtn.textContent = btnText[lang];
        }
      });
    </script>
  </body>
</html>
