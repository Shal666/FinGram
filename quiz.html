<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz — BayQadam</title>
    <link rel="stylesheet" href="css/mycss.css" />
    <link rel="stylesheet" href="css/advanced.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <style>
      .quiz-page {
        padding: 110px 24px 80px;
        background:
          radial-gradient(
            ellipse at 80% 15%,
            rgba(25, 195, 125, 0.14) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 10% 90%,
            rgba(31, 138, 95, 0.16) 0%,
            transparent 50%
          ),
          var(--bg);
        min-height: 100vh;
      }
      .quiz-container {
        max-width: 740px;
        margin: 0 auto;
      }

      .quiz-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .quiz-header h1 {
        font-family: "Fraunces", serif;
        font-weight: 400;
        color: var(--cream);
        font-size: clamp(34px, 5vw, 48px);
        margin: 0 0 28px;
        letter-spacing: -0.03em;
        line-height: 1.05;
      }
      .quiz-header h1 em {
        font-style: italic;
        color: var(--mint);
      }

      .quiz-progress {
        background: var(--bg-4);
        height: 3px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .quiz-progress-fill {
        background: var(--accent);
        height: 100%;
        transition: width 0.4s ease;
        box-shadow: 0 0 8px rgba(25, 195, 125, 0.5);
      }
      .quiz-question-number {
        font-family: "JetBrains Mono", monospace;
        color: var(--accent);
        font-weight: 600;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-bottom: 32px;
      }

      .quiz-card {
        background: var(--bg-2);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 40px;
        margin-bottom: 28px;
      }
      .quiz-question {
        font-family: "Fraunces", serif;
        font-size: 24px;
        font-weight: 500;
        color: var(--cream);
        margin-bottom: 28px;
        line-height: 1.35;
        letter-spacing: -0.015em;
      }
      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .quiz-option {
        background: var(--bg-3);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px 20px 16px 50px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s,
          color 0.2s;
        font-size: 15px;
        color: var(--cream);
        position: relative;
      }
      .quiz-option::before {
        content: attr(data-letter);
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 22px;
        height: 22px;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        transition: all 0.2s;
      }
      .quiz-option:hover {
        border-color: var(--accent);
        background: var(--bg-4);
      }
      .quiz-option:hover::before {
        border-color: var(--accent);
        color: var(--accent);
      }
      .quiz-option.selected {
        border-color: var(--accent);
        background: rgba(25, 195, 125, 0.08);
      }
      .quiz-option.selected::before {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg);
      }
      .quiz-option.correct {
        border-color: var(--accent);
        background: rgba(25, 195, 125, 0.12);
        color: var(--mint);
      }
      .quiz-option.incorrect {
        border-color: rgba(229, 115, 115, 0.5);
        background: rgba(229, 115, 115, 0.1);
        color: #ffb4b4;
      }

      .quiz-actions {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn-next {
        background: var(--accent);
        color: var(--bg);
        border: 1px solid var(--accent);
        padding: 14px 32px;
        border-radius: var(--radius);
        font-family: "Inter", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s,
          box-shadow 0.2s,
          color 0.2s,
          border-color 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-next:hover {
        background: var(--mint);
        border-color: var(--mint);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px -8px rgba(25, 195, 125, 0.6);
      }
      .btn-next:disabled {
        background: transparent;
        color: var(--muted);
        border-color: var(--line);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-back {
        background: transparent;
        color: var(--cream);
        border-color: var(--line-strong);
      }
      .btn-back:hover {
        background: transparent;
        color: var(--accent);
        border-color: var(--accent);
      }

      /* Results */
      .quiz-results {
        text-align: left;
      }
      .results-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 14px;
      }
      .results-score {
        font-family: "Fraunces", serif;
        font-size: 72px;
        font-weight: 400;
        color: var(--accent);
        letter-spacing: -0.04em;
        margin: 0 0 6px;
        line-height: 1;
      }
      .results-score .slash {
        color: var(--muted);
      }
      .results-score .total {
        color: var(--cream-dim);
        font-size: 36px;
      }
      .results-message {
        font-family: "Fraunces", serif;
        font-size: 24px;
        font-weight: 400;
        color: var(--cream);
        margin: 0 0 20px;
        letter-spacing: -0.02em;
      }
      .results-message em {
        font-style: italic;
        color: var(--mint);
      }
      .results-xp {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        color: var(--accent);
        font-weight: 600;
        padding: 10px 14px;
        background: rgba(25, 195, 125, 0.08);
        border: 1px solid rgba(25, 195, 125, 0.25);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius);
        display: inline-block;
        letter-spacing: 0.1em;
        margin-bottom: 12px;
      }
      .results-streak {
        font-family: "JetBrains Mono", monospace;
        color: var(--gold);
        font-weight: 600;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin: 8px 0 0;
      }
      .results-achievements {
        margin: 22px 0;
        padding: 20px;
        background: rgba(212, 184, 120, 0.08);
        border: 1px solid rgba(212, 184, 120, 0.25);
        border-radius: var(--radius-lg);
      }
      .results-achievements h3 {
        font-family: "Fraunces", serif;
        font-size: 18px;
        font-weight: 500;
        color: var(--gold);
        margin: 0 0 12px;
      }
      .achievement-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-3);
        border: 1px solid var(--line);
        color: var(--cream);
        padding: 8px 16px;
        border-radius: 100px;
        margin: 4px;
        font-size: 13px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="dashboard.html" class="logo">BayQadam</a>

        <div class="lang-switcher">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="kk">KZ</button>
        </div>

        <button class="burger" id="burger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>

        <nav class="nav" id="nav">
          <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="transactions.html">Transactions</a></li>
            <li><a href="goals.html">Goals</a></li>
            <li><a href="learning.html" class="active">Learning</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="#" onclick="logout()">Log out</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="quiz-page">
      <div class="quiz-container">
        <div class="quiz-header">
          <div class="quiz-eyebrow">BAYQADAM / QUIZ</div>
          <h1>Knowledge <em>check</em></h1>
          <div class="quiz-progress">
            <div
              class="quiz-progress-fill"
              id="progressBar"
              style="width: 0%"
            ></div>
          </div>
          <div class="quiz-question-number" id="questionNumber">
            Question 1 / 3
          </div>
        </div>

        <div class="quiz-card" id="quizCard">
          <p
            style="
              color: var(--muted);
              font-family: &quot;JetBrains Mono&quot;, monospace;
              font-size: 12px;
              letter-spacing: 0.14em;
              text-transform: uppercase;
            "
          >
            Loading…
          </p>
        </div>

        <div class="quiz-actions" id="quizActions"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2025 BayQadam. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>
    <script src="js/script.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      let quizData = null;
      let currentQuestion = 0;
      let userAnswers = [];
      let lessonId = null;
      const LETTERS = ["A", "B", "C", "D", "E", "F"];

      async function init() {
        const user = await requireAuth();
        if (!user) return;
        const params = new URLSearchParams(window.location.search);
        lessonId = params.get("lesson");
        if (!lessonId) {
          window.location.href = "learning.html";
          return;
        }
        await loadQuiz();
      }

      async function loadQuiz() {
        try {
          quizData = await apiFetch(`/api/learning/lessons/${lessonId}/quiz`);
          userAnswers = new Array(quizData.questions.length).fill(-1);
          showQuestion(0);
        } catch (error) {
          document.getElementById("quizCard").innerHTML =
            `<p style="color: #ffb4b4; font-family: 'JetBrains Mono', monospace; font-size: 13px;">ERR — ${error.message}</p>`;
        }
      }

      function showQuestion(index) {
        const q = quizData.questions[index];
        const question = q.question_en || q.question;
        const options = q.options_en || q.options;

        const progress = ((index + 1) / quizData.total_questions) * 100;
        document.getElementById("progressBar").style.width = progress + "%";
        document.getElementById("questionNumber").textContent =
          `Question ${index + 1} / ${quizData.total_questions}`;

        let html = `<div class="quiz-question">${question}</div><div class="quiz-options">`;
        options.forEach((opt, i) => {
          const selected = userAnswers[index] === i ? "selected" : "";
          html += `<div class="quiz-option ${selected}" onclick="selectOption(${i})" data-index="${i}" data-letter="${LETTERS[i] || i + 1}">${opt}</div>`;
        });
        html += "</div>";
        document.getElementById("quizCard").innerHTML = html;

        const isLast = index === quizData.total_questions - 1;
        const hasAnswer = userAnswers[index] !== -1;
        let actionsHtml = "";
        if (index > 0)
          actionsHtml += `<button class="btn-next btn-back" onclick="prevQuestion()">← Back</button>`;
        else actionsHtml += `<span></span>`;
        if (isLast)
          actionsHtml += `<button class="btn-next" onclick="submitQuiz()" id="submitBtn" ${hasAnswer ? "" : "disabled"}>Finish →</button>`;
        else
          actionsHtml += `<button class="btn-next" onclick="nextQuestion()" id="nextBtn" ${hasAnswer ? "" : "disabled"}>Next →</button>`;
        document.getElementById("quizActions").innerHTML = actionsHtml;
      }

      function selectOption(i) {
        userAnswers[currentQuestion] = i;
        document
          .querySelectorAll(".quiz-option")
          .forEach((opt, idx) => opt.classList.toggle("selected", idx === i));
        const btn =
          document.getElementById("nextBtn") ||
          document.getElementById("submitBtn");
        if (btn) btn.disabled = false;
      }

      function nextQuestion() {
        if (currentQuestion < quizData.total_questions - 1) {
          currentQuestion++;
          showQuestion(currentQuestion);
        }
      }
      function prevQuestion() {
        if (currentQuestion > 0) {
          currentQuestion--;
          showQuestion(currentQuestion);
        }
      }

      async function submitQuiz() {
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "Checking…";
        try {
          const r = await apiFetch(
            `/api/learning/lessons/${lessonId}/quiz/submit`,
            {
              method: "POST",
              body: JSON.stringify({ answers: userAnswers }),
            },
          );
          showResults(r);
        } catch (error) {
          alert("Error: " + error.message);
          btn.disabled = false;
          btn.textContent = "Finish →";
        }
      }

      function showResults(r) {
        const passed = r.passed;
        const message = passed
          ? "Quiz <em>passed</em>."
          : "Try <em>again</em>.";

        let achievements = "";
        if (r.new_achievements && r.new_achievements.length) {
          achievements = `<div class="results-achievements"><h3>New achievements</h3>${r.new_achievements.map((a) => `<span class="achievement-badge">${a}</span>`).join("")}</div>`;
        }
        let streak = "";
        if (r.streak > 1)
          streak = `<p class="results-streak">→ ${r.streak} days in a row</p>`;

        document.getElementById("quizCard").innerHTML = `
          <div class="quiz-results">
            <div class="results-eyebrow">RESULT / SCORE</div>
            <div class="results-score">${r.correct}<span class="slash">/</span><span class="total">${r.total}</span></div>
            <div class="results-message">${message}</div>
            ${passed ? `<div class="results-xp">+ ${r.xp_earned} XP</div>` : ""}
            ${streak}
            ${achievements}
          </div>`;

        let actionsHtml = "";
        if (!passed)
          actionsHtml += `<button class="btn-next btn-back" onclick="retryQuiz()">↻ Try again</button>`;
        else actionsHtml += `<span></span>`;
        actionsHtml += `<a href="learning.html" class="btn-next">Back to lessons →</a>`;
        document.getElementById("quizActions").innerHTML = actionsHtml;
        document.getElementById("questionNumber").textContent = "Results";
        document.getElementById("progressBar").style.width = "100%";
      }

      function retryQuiz() {
        currentQuestion = 0;
        userAnswers = new Array(quizData.questions.length).fill(-1);
        showQuestion(0);
      }

      init();
    </script>
  </body>
</html>
